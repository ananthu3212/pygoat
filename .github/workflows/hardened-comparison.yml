# ================================================================
# hardened-comparison.yml — Our Hardened Pipeline on PyGoat
#
# Runs our reusable shift-left security pipeline against
# OladeleO/pygoat for comparison with their original pipeline.
#
# Thesis: Shift-Left Security in CI/CD Pipelines
# Author: Ananthu Chandra Babu
# University: Westfälische Hochschule Gelsenkirchen, 2026
# ================================================================

name: Our Hardened Pipeline (Comparison)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  pages: write
  id-token: write

jobs:
  security-scan:
    uses: ananthu3212/shift-left-security-thesis/.github/workflows/security-scan-reusable.yml@main
    with:
      docker-image-name: pygoat-comparison
      semgrep-config: p/python
      enable-flask-rules: false
      enable-dast: true
      app-start-command: 'docker run -d --name pygoat_app -p 8000:8000 pygoat/pygoat:latest && sleep 30'
      app-port: '8000'
      trivy-severity: HIGH,CRITICAL
      fail-on-findings: false
    secrets: inherit